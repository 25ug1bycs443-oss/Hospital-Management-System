<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - Tulsi Hospitals Portal</title>
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Font Awesome -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <!-- Core Stylesheet -->
  <link href="css/style.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #0a1931 0%, #15305b 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-container {
      background-color: #ffffff;
      border-radius: 20px;
      padding: 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    .login-header {
      text-align: center;
      margin-bottom: 30px;
    }
    .login-header i {
      font-size: 48px;
      color: var(--accent-orange);
      margin-bottom: 15px;
    }
    .login-header h2 {
      font-weight: 800;
      color: var(--primary-dark);
      font-size: 24px;
    }
    .login-header p {
      color: var(--text-muted);
      font-size: 14px;
    }
    .btn-login {
      background-color: var(--accent-orange);
      color: #fff;
      font-weight: 600;
      border: none;
      width: 100%;
      padding: 12px;
      border-radius: 30px;
      margin-top: 20px;
      transition: var(--transition);
    }
    .btn-login:hover {
      background-color: var(--accent-orange-hover);
      box-shadow: 0 4px 12px rgba(255, 107, 0, 0.3);
    }
    .credential-hint {
      margin-top: 25px;
      padding: 12px;
      background-color: var(--bg-light);
      border-radius: 8px;
      font-size: 12px;
      color: var(--text-muted);
      border-left: 4px solid var(--accent-orange);
    }
  </style>
</head>
<body>

  <div class="login-container">
    <div class="login-header">
      <i class="fa-solid fa-hospital-user"></i>
      <h2>Tulsi Hospitals</h2>
      <p>Clinical Workspace Portal Login</p>
    </div>

    <div id="alert-box" class="alert alert-danger d-none" role="alert"></div>

    <form id="login-form">
      <div class="mb-3">
        <label for="username" class="form-label fw-semibold" style="color: #475569; font-size: 13px;">Username</label>
        <div class="input-group">
          <span class="input-group-text bg-light border-end-0"><i class="fa-solid fa-user text-muted"></i></span>
          <input type="text" class="form-control bg-light border-start-0" id="username" placeholder="Enter username" required>
        </div>
      </div>
      <div class="mb-3">
        <label for="password" class="form-label fw-semibold" style="color: #475569; font-size: 13px;">Password</label>
        <div class="input-group">
          <span class="input-group-text bg-light border-end-0"><i class="fa-solid fa-lock text-muted"></i></span>
          <input type="password" class="form-control bg-light border-start-0" id="password" placeholder="Enter password" required>
        </div>
      </div>
      
      <button type="submit" class="btn btn-login">
        Sign In <i class="fa-solid fa-arrow-right-to-bracket ms-2"></i>
      </button>
    </form>

    <div class="credential-hint">
      <strong>Demo Credentials:</strong><br>
      Username: <code class="text-dark">admin</code><br>
      Password: <code class="text-dark">admin123</code>
    </div>
  </div>

  <!-- Script to handle login -->
  <script>
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const alertBox = document.getElementById('alert-box');
      alertBox.classList.add('d-none');

      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;

      try {
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        const data = await response.json();
        if (response.ok && data.success) {
          // Redirect to clinical workspace dashboard
          window.location.href = '/dashboard.html';
        } else {
          alertBox.textContent = data.error || 'Login failed';
          alertBox.classList.remove('d-none');
        }
      } catch (err) {
        alertBox.textContent = 'Server connection error. Ensure backend is running.';
        alertBox.classList.remove('d-none');
      }
    });
  </script>
</body>
</html>
