<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Patients Module - Tulsi Hospitals Portal</title>
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons & Font Awesome -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <!-- Core & Dashboard Stylesheet -->
  <link href="css/style.css" rel="stylesheet">
  <link href="css/dashboard.css" rel="stylesheet">
  <script>
    fetch('/api/auth/session')
      .then(res => res.json())
      .then(data => {
        if (!data.loggedIn) window.location.href = '/login.html';
      });
  </script>
</head>
<body id="patients-page">

  <div class="dashboard-wrapper">
    <!-- Left Navigation Sidebar -->
    <aside class="hms-sidebar">
      <div class="sidebar-header">
        <a href="dashboard.html" class="sidebar-brand">
          <i class="fa-solid fa-square-h text-primary"></i>
          <div>
            Tulsi Hospitals
            <span>Hospital Portal -></span>
          </div>
        </a>
      </div>
      <ul class="sidebar-menu">
        <li><a href="index.html" class="sidebar-link"><i class="bi bi-house-door"></i> Home (Portal)</a></li>
        <li><a href="dashboard.html" class="sidebar-link"><i class="bi bi-grid"></i> Dashboard</a></li>
        <li><a href="patients.html" class="sidebar-link active"><i class="bi bi-people-fill"></i> Patients</a></li>
        <li><a href="doctors.html" class="sidebar-link"><i class="bi bi-person-badge"></i> Doctors</a></li>
        <li><a href="appointments.html" class="sidebar-link"><i class="bi bi-calendar-check"></i> Appointments</a></li>
        <li><a href="wards.html" class="sidebar-link"><i class="bi bi-hospital"></i> Wards & Beds</a></li>
        <li><a href="hospitals.html" class="sidebar-link"><i class="bi bi-geo-alt"></i> Hospitals</a></li>
        <li><a href="billing.html" class="sidebar-link"><i class="bi bi-credit-card"></i> Billing</a></li>
      </ul>
      <div class="sidebar-footer">
        <button onclick="logoutAdmin()" class="btn btn-outline-danger w-100 rounded-pill py-2">
          <i class="bi bi-box-arrow-right me-2"></i> Log Out
        </button>
      </div>
    </aside>

    <!-- Workspace Panel -->
    <main class="dashboard-content">
      <!-- Topbar -->
      <div class="workspace-topbar">
        <div class="workspace-title"><i class="bi bi-people-fill text-primary"></i> Patients Registry</div>
        <div class="topbar-actions">
          <button class="topbar-btn topbar-btn-orange" data-bs-toggle="modal" data-bs-target="#addPatientModal">
            <i class="bi bi-plus-circle-fill"></i> Register New Patient
          </button>
        </div>
      </div>

      <!-- Search & Filters -->
      <div class="card-table-hms mb-4" style="padding: 15px 24px;">
        <div class="row g-3 align-items-center">
          <div class="col-md-6">
            <div class="input-group" style="max-width: 450px;">
              <span class="input-group-text bg-white border-end-0 text-muted"><i class="bi bi-search"></i></span>
              <input type="text" id="patient-search-input" class="form-control border-start-0" placeholder="Search patients by name, ID, contact..." onkeyup="searchPatientsList()">
            </div>
          </div>
        </div>
      </div>

      <!-- Patients Data Table -->
      <div class="card-table-hms">
        <div class="table-responsive">
          <table class="table-hms">
            <thead>
              <tr>
                <th>Patient ID</th>
                <th>Name</th>
                <th>Age</th>
                <th>Gender</th>
                <th>Contact Number</th>
                <th>Blood Group</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="patients-table-body">
              <tr><td colspan="7" class="text-center">Loading patients data...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <!-- Add Patient Modal -->
  <div class="modal fade" id="addPatientModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content modal-content-hms">
        <div class="modal-header modal-header-hms">
          <h5 class="modal-title"><i class="bi bi-person-plus-fill me-2"></i> Register New Patient</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body p-4">
          <form id="add-patient-form">
            <div class="mb-3">
              <label for="p-name" class="form-label form-label-hms">Full Name</label>
              <input type="text" class="form-control form-control-hms" id="p-name" required>
            </div>
            <div class="row">
              <div class="col-md-6 mb-3">
                <label for="p-age" class="form-label form-label-hms">Age</label>
                <input type="number" class="form-control form-control-hms" id="p-age" required>
              </div>
              <div class="col-md-6 mb-3">
                <label for="p-gender" class="form-label form-label-hms">Gender</label>
                <select class="form-select form-control-hms" id="p-gender" required>
                  <option value="" disabled selected>Select</option>
                  <option value="Male">Male</option>
                  <option value="Female">Female</option>
                  <option value="Other">Other</option>
                </select>
              </div>
            </div>
            <div class="row">
              <div class="col-md-6 mb-3">
                <label for="p-contact" class="form-label form-label-hms">Contact Number</label>
                <input type="tel" class="form-control form-control-hms" id="p-contact" required>
              </div>
              <div class="col-md-6 mb-3">
                <label for="p-blood" class="form-label form-label-hms">Blood Group</label>
                <select class="form-select form-control-hms" id="p-blood" required>
                  <option value="" disabled selected>Select</option>
                  <option value="A+">A+</option>
                  <option value="A-">A-</option>
                  <option value="B+">B+</option>
                  <option value="B-">B-</option>
                  <option value="O+">O+</option>
                  <option value="O-">O-</option>
                  <option value="AB+">AB+</option>
                  <option value="AB-">AB-</option>
                </select>
              </div>
            </div>
            <button type="submit" class="btn btn-primary-hms w-100 mt-2 justify-content-center">Save Patient Record</button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <!-- Edit Patient Modal -->
  <div class="modal fade" id="editPatientModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content modal-content-hms">
        <div class="modal-header modal-header-hms">
          <h5 class="modal-title"><i class="bi bi-pencil-square me-2"></i> Edit Patient Record</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body p-4">
          <form id="edit-patient-form">
            <input type="hidden" id="edit-p-id">
            <div class="mb-3">
              <label for="edit-p-name" class="form-label form-label-hms">Full Name</label>
              <input type="text" class="form-control form-control-hms" id="edit-p-name" required>
            </div>
            <div class="row">
              <div class="col-md-6 mb-3">
                <label for="edit-p-age" class="form-label form-label-hms">Age</label>
                <input type="number" class="form-control form-control-hms" id="edit-p-age" required>
              </div>
              <div class="col-md-6 mb-3">
                <label for="edit-p-gender" class="form-label form-label-hms">Gender</label>
                <select class="form-select form-control-hms" id="edit-p-gender" required>
                  <option value="Male">Male</option>
                  <option value="Female">Female</option>
                  <option value="Other">Other</option>
                </select>
              </div>
            </div>
            <div class="row">
              <div class="col-md-6 mb-3">
                <label for="edit-p-contact" class="form-label form-label-hms">Contact Number</label>
                <input type="tel" class="form-control form-control-hms" id="edit-p-contact" required>
              </div>
              <div class="col-md-6 mb-3">
                <label for="edit-p-blood" class="form-label form-label-hms">Blood Group</label>
                <select class="form-select form-control-hms" id="edit-p-blood" required>
                  <option value="A+">A+</option>
                  <option value="A-">A-</option>
                  <option value="B+">B+</option>
                  <option value="B-">B-</option>
                  <option value="O+">O+</option>
                  <option value="O-">O-</option>
                  <option value="AB+">AB+</option>
                  <option value="AB-">AB-</option>
                </select>
              </div>
            </div>
            <button type="submit" class="btn btn-primary-hms w-100 mt-2 justify-content-center">Update Patient Record</button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <!-- JS files -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
